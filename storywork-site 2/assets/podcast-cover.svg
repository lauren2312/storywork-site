<!-- Podcast cover — Behind the Curtain
     SVG approximation matching the existing podcast art:
     cream background, teal script lettering, SW mark, serif tagline.
     SWAP NOTE: replace with the real podcast-cover.jpg when uploaded. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Behind the Curtain podcast cover">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&amp;family=Cormorant+Garamond:ital,wght@1,400&amp;display=swap');
      .script { font-family: 'Caveat', cursive; font-weight: 600; fill: #0e4f56; }
      .serif  { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; fill: #8c7853; }
    </style>
    <linearGradient id="curtainL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ede4d3" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f5efe2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="curtainR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#ede4d3" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f5efe2" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="600" height="600" fill="#faf7f2"/>

  <!-- soft curtain edges -->
  <rect x="0" y="0" width="120" height="600" fill="url(#curtainL)"/>
  <rect x="480" y="0" width="120" height="600" fill="url(#curtainR)"/>

  <!-- subtle vertical curtain pleats -->
  <g stroke="#ede4d3" stroke-width="1" opacity="0.6">
    <line x1="40"  y1="0" x2="40"  y2="600"/>
    <line x1="75"  y1="0" x2="75"  y2="600"/>
    <line x1="105" y1="0" x2="105" y2="600"/>
    <line x1="495" y1="0" x2="495" y2="600"/>
    <line x1="525" y1="0" x2="525" y2="600"/>
    <line x1="560" y1="0" x2="560" y2="600"/>
  </g>

  <!-- floor line -->
  <line x1="0" y1="565" x2="600" y2="565" stroke="#d8d0bf" stroke-width="1.5"/>

  <!-- SW logo mark in top right -->
  <g transform="translate(530 70)">
    <rect x="-30" y="-30" width="60" height="60" fill="#a89373"/>
    <rect x="-30" y="-30" width="60" height="60" fill="#a89373" transform="rotate(45)"/>
    <circle r="20" fill="#faf7f2"/>
    <rect x="-17" y="-17" width="34" height="34" fill="none" stroke="#0e4f56" stroke-width="1.2" transform="rotate(45)"/>
    <text x="0" y="2" text-anchor="middle" dominant-baseline="middle"
          font-family="'Cormorant Garamond', Georgia, serif"
          font-size="17" font-weight="600" font-style="italic"
          fill="#0e4f56">SW</text>
  </g>

  <!-- main lettering: behind / the / curtain -->
  <g text-anchor="middle">
    <text class="script" x="300" y="200" font-size="100">behind</text>
    <text class="script" x="300" y="320" font-size="100">the</text>
    <text class="script" x="300" y="440" font-size="100">curtain</text>
  </g>

  <!-- subtle underline beneath "the" -->
  <line x1="240" y1="335" x2="360" y2="335" stroke="#0e4f56" stroke-width="2.5"/>

  <!-- tagline -->
  <text class="serif" x="300" y="525" text-anchor="middle" font-size="32">with Lauren Shippy</text>
</svg>
