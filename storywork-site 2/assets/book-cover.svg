<!-- Book cover — Seen, Known + Heard
     SVG approximation of the real cover (pure typography, looks identical).
     SWAP NOTE: replace with the real book-cover.jpg when you upload it. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-label="Seen, Known + Heard book cover">
  <rect width="600" height="900" fill="#000"/>
  <g font-family="Helvetica, Arial Black, 'Arial Bold', sans-serif" font-weight="900" fill="#fff" text-anchor="middle">
    <text x="300" y="260" font-size="120" letter-spacing="-2">SEEN</text>
    <text x="300" y="400" font-size="120" letter-spacing="-2">KNOWN</text>
    <text x="300" y="510" font-size="100" font-weight="700">+</text>
    <text x="300" y="640" font-size="120" letter-spacing="-2">HEARD</text>
    <text x="300" y="710" font-size="26" font-weight="400" font-style="italic" letter-spacing="0.5">And How it Changes Everything.</text>
    <text x="300" y="840" font-size="32" font-weight="500" letter-spacing="2">Lauren C Shippy</text>
  </g>
</svg>
